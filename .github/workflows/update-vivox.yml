name: Update Valorant Rules

on:
  schedule:
    - cron: '0 */1 * * *'     # каждые 1 час
  workflow_dispatch:          # можно запускать вручную

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update rules from Netlimiter
        run: python update_rules.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add rule-sets/vivox_valorant.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Vivox/Valorant rules - $(date)"
          git push